# Alembic config for Sift. Run from the repo root: `alembic upgrade head`.
# The database URL is resolved at runtime from sift settings (see migrations/env.py);
# the value below is only a fallback for tooling that inspects the file statically.
[alembic]
script_location = backend/sift/db/migrations
prepend_sys_path = backend
sqlalchemy.url = sqlite:///sift.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
